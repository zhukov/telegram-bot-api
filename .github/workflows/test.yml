name: Test

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module tidy state
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -shuffle=on -count=1 -timeout=10m ./...

  api-parity:
    name: API Parity
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download API spec
        run: |
          curl --fail --location --retry 3 --retry-delay 2 \
            --output api.json \
            https://raw.githubusercontent.com/PaulSonOfLars/telegram-bot-api-spec/main/api.json

      - name: Run API parity tests
        run: go test -tags api_parity -run '^TestAPIParity' -v .
